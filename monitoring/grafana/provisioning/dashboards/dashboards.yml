# ============================================================
# Grafana Dashboard Provisioning — DataForge Platform
# ============================================================

apiVersion: 1

providers:
  - name: DataForge
    orgId: 1
    folder: DataForge
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
