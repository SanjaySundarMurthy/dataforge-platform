# ============================================================
# Alertmanager Configuration — DataForge Platform
# ============================================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'team']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 5m
    - match:
        team: data-engineering
      receiver: 'data-team'
    - match:
        team: platform
      receiver: 'platform-team'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9095/alerts'
        send_resolved: true

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:9095/alerts/critical'
        send_resolved: true

  - name: 'data-team'
    webhook_configs:
      - url: 'http://localhost:9095/alerts/data-team'
        send_resolved: true

  - name: 'platform-team'
    webhook_configs:
      - url: 'http://localhost:9095/alerts/platform-team'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
