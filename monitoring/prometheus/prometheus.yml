# ============================================================
# Prometheus Configuration — DataForge Platform
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alert Rules ──────────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Alertmanager ─────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape Configs ───────────────────────────────────────────
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # DataForge API
  - job_name: 'dataforge-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'dataforge-api'
          environment: 'local'

  # Spark Master (REST API — not a native Prometheus exporter)
  - job_name: 'spark-master'
    metrics_path: '/metrics/prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['spark-master:8080']
        labels:
          service: 'spark-master'

  # Node Exporter (Host metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'

  # Kubernetes service discovery (when running on K8s)
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
  #     - role: pod
  #   relabel_configs:
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
  #       action: keep
  #       regex: true
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
  #       action: replace
  #       target_label: __metrics_path__
  #       regex: (.+)
