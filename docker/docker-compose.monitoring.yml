# ============================================================
# DataForge Platform - Docker Compose (Monitoring Stack)
# ============================================================

services:
  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: dataforge-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - dataforge-network

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: dataforge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-dataforge123}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - dataforge-network

  # ── AlertManager ───────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: dataforge-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - dataforge-network

  # ── Loki (Log Aggregation) ─────────────────────────────────
  loki:
    image: grafana/loki:2.9.3
    container_name: dataforge-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - dataforge-network

  # ── Node Exporter (Host Metrics) ───────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: dataforge-node-exporter
    ports:
      - "9100:9100"
    networks:
      - dataforge-network

  # ── PostgreSQL Exporter ────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dataforge-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-dataforge_admin}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-dataforge}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - dataforge-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  dataforge-network:
    external: true
