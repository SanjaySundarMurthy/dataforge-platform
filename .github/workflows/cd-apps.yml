# ============================================================
# CD Applications — DataForge Platform
# Build images, push to ACR, deploy to AKS via Helm
# ============================================================
name: CD — Applications

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docker/**"
      - "data-generator/**"
      - "spark-jobs/**"
      - "helm-charts/**"
      - "kubernetes/**"

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}

jobs:
  # ----------------------------------------------------------
  # Build & Push Docker Images
  # ----------------------------------------------------------
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { context: "docker/spark", name: "dataforge-spark" }
          - { context: "api", name: "dataforge-api" }
          - { context: "data-generator", name: "dataforge-generator" }
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image.name }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Deploy to AKS via Helm
  # ----------------------------------------------------------
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm upgrade
        run: |
          helm upgrade --install dataforge \
            helm-charts/dataforge-platform \
            --namespace dataforge \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set image.registry=${{ env.ACR_NAME }}.azurecr.io \
            --wait \
            --timeout 10m
