# ============================================================
# CI Pipeline — DataForge Platform
# Runs on every PR and push to main
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ----------------------------------------------------------
  # Lint & Format Checks
  # ----------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install ruff black mypy

      - name: Ruff check
        run: ruff check spark-jobs/ api/ data-generator/

      - name: Black check
        run: black --check spark-jobs/ api/ data-generator/

  # ----------------------------------------------------------
  # Python Unit Tests
  # ----------------------------------------------------------
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Java (Spark dependency)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          pip install pyspark==3.5.0 delta-spark==3.0.0 pytest pytest-cov

      - name: Run Spark tests
        run: |
          cd spark-jobs
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Run API tests
        run: |
          pip install fastapi uvicorn httpx prometheus-client
          cd api
          python -m pytest tests/ -v --tb=short

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: spark-jobs/coverage.xml

  # ----------------------------------------------------------
  # Terraform Validation
  # ----------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infrastructure

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infrastructure

      - name: Terraform validate
        run: terraform validate
        working-directory: infrastructure

  # ----------------------------------------------------------
  # Helm Chart Lint
  # ----------------------------------------------------------
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint helm-charts/dataforge-platform

  # ----------------------------------------------------------
  # Docker Build (no push)
  # ----------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        image:
          - { context: "docker/spark", name: "spark" }
          - { context: "api", name: "api" }
          - { context: "data-generator", name: "data-generator" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          push: false
          tags: dataforge/${{ matrix.image.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # dbt Validation
  # ----------------------------------------------------------
  dbt-check:
    name: dbt Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-postgres==1.7.0

      - name: dbt deps
        run: dbt deps
        working-directory: data-warehouse/dbt
        env:
          DBT_PROFILES_DIR: .

      - name: dbt compile
        run: dbt compile
        working-directory: data-warehouse/dbt
        env:
          DBT_PROFILES_DIR: .
