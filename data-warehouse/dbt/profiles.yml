dataforge:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dataforge_admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'changeme_in_production') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'dataforge') }}"
      schema: staging
      threads: 4
